name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Fresh Android App
        run: |
          PKG="${{ github.event.client_payload.package_name }}"
          APP="${{ github.event.client_payload.app_name }}"
          PKG=$(echo "$PKG" | tr -d ' ' | tr -d '"' | tr -d "'")
          APP=$(echo "$APP" | tr -d '"' | tr -d "'")
          if [[ "$PKG" != *.* ]]; then
            PKG="com.xtrweb.$PKG"
          fi
          
          cordova create xtrapp "$PKG" "$APP"
          cd xtrapp
          # 🚨 Android 12+ স্প্ল্যাশ স্ক্রিন ফুল স্ক্রিন করার জন্য Android 13 ব্যবহার করা হচ্ছে
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-android-permissions

      - name: Process Code, Image & Fix Hang (Full Screen Splash) 🚨
        env:
          USE_CAMERA: ${{ github.event.client_payload.use_camera }}
          USE_MIC: ${{ github.event.client_payload.use_mic }}
        run: |
          cat << 'EOF' > process_app.py
          import os, json, base64

          try:
              with open('user_data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              html = data.get('code', '<h1>Error loading code!</h1>')
              # 🚨 ডেটা ক্লিনিং (স্পেস ও নতুন লাইন রিমুভ করা হচ্ছে)
              icon = data.get('icon', 'null').replace('\n', '').strip()
              splash = data.get('splash', 'null').replace('\n', '').strip()
          except:
              html = '<h1>JSON Data Error!</h1>'
              icon = 'null'
              splash = 'null'

          use_cam = str(os.environ.get('USE_CAMERA', 'false')).lower() == 'true'
          use_mic = str(os.environ.get('USE_MIC', 'false')).lower() == 'true'

          if 'cordova.js' not in html:
              html = '<script src="cordova.js"></script>\n' + html

          cam_str = 'true' if use_cam else 'false'
          mic_str = 'true' if use_mic else 'false'

          script = f"""
          <script>
          document.addEventListener('deviceready', function() {{
              var permissions = cordova.plugins.permissions;
              var list = [];
              if ({cam_str}) list.push(permissions.CAMERA);
              if ({mic_str}) list.push(permissions.RECORD_AUDIO);
              if (list.length > 0) {{
                  permissions.requestPermissions(list, function(){{}}, function(){{}});
              }}
              
              setTimeout(function() {{
                 if(navigator.splashscreen) navigator.splashscreen.hide();
              }}, 3000);
          }}, false);
          </script>
          """
          
          if '</body>' in html:
              html = html.replace('</body>', script + '\n</body>')
          else:
              html += script
              
          with open('xtrapp/www/index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          os.makedirs('xtrapp/res', exist_ok=True)

          with open('xtrapp/config.xml', 'r', encoding='utf-8') as f:
              config = f.read()
              
          config = config.replace('<widget ', '<widget xmlns:android="http://schemas.android.com/apk/res/android" ')

          timeout_fix = """
          <preference name="loadUrlTimeoutValue" value="700000" />
          <preference name="KeepRunning" value="true" />
          <preference name="ErrorUrl" value="" />
          """
          config = config.replace('</widget>', timeout_fix + '\n</widget>')

          # 🚨 আইকন ও স্প্ল্যাশ স্ক্রিন সেভ (প্যাডিং == যোগ করা হলো)
          if icon != 'null':
              try:
                  with open('xtrapp/res/icon.png', 'wb') as f:
                      f.write(base64.b64decode(icon + '==='))
                  config = config.replace('</widget>', '    <icon src="res/icon.png" />\n</widget>')
              except Exception as e: 
                  print('Icon Error:', e)

          if splash != 'null':
              try:
                  with open('xtrapp/res/splash.png', 'wb') as f:
                      f.write(base64.b64decode(splash + '==='))
                  
                  # 🚨 ম্যাজিক ফিক্স: স্প্ল্যাশ স্ক্রিন ফুল স্ক্রিন করার কোড
                  s_xml = """
                  <preference name="AndroidWindowSplashScreenAnimatedIcon" value="res/splash.png" />
                  <preference name="AndroidWindowSplashScreenBackground" value="#FFFFFF" />
                  <preference name="SplashScreenDelay" value="3000" />
                  <preference name="ShowSplashScreenSpinner" value="false" />
                  """
                  config = config.replace('</widget>', s_xml + '\n</widget>')
              except Exception as e: 
                  print('Splash Error:', e)

          p_xml = '<platform name="android">\n'
          # ফুল স্ক্রিন থিম 
          p_xml += '  <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">\n    <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" />\n  </edit-config>\n'
          
          if use_cam:
              p_xml += '  <config-file target="AndroidManifest.xml" parent="/*">\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n  </config-file>\n'
          if use_mic:
              p_xml += '  <config-file target="AndroidManifest.xml" parent="/*">\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n  </config-file>\n'
          p_xml += '</platform>'

          config = config.replace('</widget>', p_xml + '\n</widget>')
          
          with open('xtrapp/config.xml', 'w', encoding='utf-8') as f:
              f.write(config)
          EOF
          
          python3 process_app.py

      - name: Compile and Build APK
        run: |
          cd xtrapp
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          echo "org.gradle.jvmargs=-Xmx2048m" >> platforms/android/gradle.properties
          cordova build android --debug

      - name: Release Final APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
          gh release create latest xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk -t "latest" -n "Latest Build"
