name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Fresh Android App
        run: |
          PKG="${{ github.event.client_payload.package_name }}"
          APP="${{ github.event.client_payload.app_name }}"
          PKG=$(echo "$PKG" | tr -d ' ' | tr -d '"' | tr -d "'")
          APP=$(echo "$APP" | tr -d '"' | tr -d "'")
          if [[ "$PKG" != *.* ]]; then
            PKG="com.xtrweb.$PKG"
          fi
          
          cordova create xtrapp "$PKG" "$APP"
          cd xtrapp
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-android-permissions
          cordova plugin add cordova-plugin-file
          cordova plugin add cordova-plugin-file-transfer
          cordova plugin add cordova-plugin-statusbar

      - name: Process Code, Images, Permissions & Fix White Screen 🚨
        env:
          USE_CAMERA: ${{ github.event.client_payload.use_camera }}
          USE_MIC: ${{ github.event.client_payload.use_mic }}
          USE_STORAGE: ${{ github.event.client_payload.use_storage }}
          STATUS_BAR_COLOR: ${{ github.event.client_payload.status_bar_color }}
        run: |
          cat << 'EOF' > process_app.py
          import os, json, base64, re

          try:
              with open('user_data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              html = data.get('code', '<h1>Error loading code!</h1>')
              icon = data.get('icon', 'null')
              splash = data.get('splash', 'null')
          except:
              html = '<h1>JSON Data Error!</h1>'
              icon = 'null'
              splash = 'null'

          use_cam = str(os.environ.get('USE_CAMERA', 'false')).lower() == 'true'
          use_mic = str(os.environ.get('USE_MIC', 'false')).lower() == 'true'
          use_storage = str(os.environ.get('USE_STORAGE', 'false')).lower() == 'true'
          status_color = os.environ.get('STATUS_BAR_COLOR', '#0D6EFD')

          cam_str = 'true' if use_cam else 'false'
          mic_str = 'true' if use_mic else 'false'
          store_str = 'true' if use_storage else 'false'

          # 🚨 ম্যাজিক ১: White Screen (সাদা স্ক্রিন) ফিক্স!
          # cordova.js সব সময় <head> বা <body> এর একদম শুরুতে লোড করতে হয়
          if 'cordova.js' not in html:
              if '<head>' in html.lower():
                  html = re.sub(r'(<head[^>]*>)', r'\1\n<script src="cordova.js"></script>\n', html, count=1, flags=re.IGNORECASE)
              elif '<body' in html.lower():
                  html = re.sub(r'(<body[^>]*>)', r'\1\n<script src="cordova.js"></script>\n', html, count=1, flags=re.IGNORECASE)
              else:
                  html = '<script src="cordova.js"></script>\n' + html

          script = f"""
          <script>
          document.addEventListener('deviceready', function() {{
              if(StatusBar) {{
                  StatusBar.backgroundColorByHexString('{status_color}');
                  StatusBar.styleLightContent();
              }}

              var permissions = cordova.plugins.permissions;
              var list = [];
              if ({cam_str}) list.push(permissions.CAMERA);
              if ({mic_str}) list.push(permissions.RECORD_AUDIO);
              if ({store_str}) {{
                  list.push('android.permission.READ_MEDIA_IMAGES');
                  list.push('android.permission.READ_MEDIA_VIDEO');
                  list.push(permissions.WRITE_EXTERNAL_STORAGE);
                  list.push(permissions.READ_EXTERNAL_STORAGE);
              }}
              if (list.length > 0) {{
                  permissions.requestPermissions(list, function(){{}}, function(){{}});
              }}
              
              setTimeout(function() {{
                 if(navigator.splashscreen) navigator.splashscreen.hide();
              }}, 3000);

              document.addEventListener('click', function(e) {{
                  var target = e.target;
                  while (target && target.tagName !== 'A') target = target.parentNode;
                  
                  if (target && target.hasAttribute('download')) {{
                      e.preventDefault();
                      var url = target.href;
                      var filename = target.getAttribute('download') || 'downloaded_file';
                      
                      if (!{store_str}) {{
                          alert("Please enable 'Download Photo/Video' permission to save files.");
                          return;
                      }}

                      if (url.startsWith('http')) {{
                          var ft = new FileTransfer();
                          var store = cordova.file.externalRootDirectory + 'Download/' + filename;
                          ft.download(url, store, function(entry) {{
                              alert('File successfully saved to Downloads folder!');
                          }}, function(err) {{
                              alert('Error saving file!');
                          }});
                      }} else if (url.startsWith('blob:')) {{
                          var xhr = new XMLHttpRequest();
                          xhr.open('GET', url, true);
                          xhr.responseType = 'blob';
                          xhr.onload = function() {{
                              var reader = new FileReader();
                              reader.readAsDataURL(xhr.response);
                              reader.onloadend = function() {{
                                  var base64data = reader.result.split(',')[1];
                                  saveBase64ToGallery(base64data, filename, xhr.response.type);
                              }}
                          }};
                          xhr.send();
                      }}
                  }}
              }});

              function saveBase64ToGallery(b64Data, filename, contentType) {{
                  var folder = cordova.file.externalRootDirectory + 'Download/';
                  window.resolveLocalFileSystemURL(folder, function(dirEntry) {{
                      dirEntry.getFile(filename, {{create: true, exclusive: false}}, function(fileEntry) {{
                          fileEntry.createWriter(function(fileWriter) {{
                              fileWriter.onwriteend = function() {{ alert('Successfully saved to Downloads folder!'); }};
                              fileWriter.onerror = function() {{ alert('Failed to save file.'); }};
                              var byteCharacters = atob(b64Data);
                              var byteArrays = [];
                              for (var offset = 0; offset < byteCharacters.length; offset += 512) {{
                                  var slice = byteCharacters.slice(offset, offset + 512);
                                  var byteNumbers = new Array(slice.length);
                                  for (var i = 0; i < slice.length; i++) byteNumbers[i] = slice.charCodeAt(i);
                                  byteArrays.push(new Uint8Array(byteNumbers));
                              }}
                              fileWriter.write(new Blob(byteArrays, {{type: contentType}}));
                          }});
                      }});
                  }});
              }}
          }}, false);
          
          window.onload = function() {{
              setTimeout(function() {{
                  if(navigator.splashscreen) navigator.splashscreen.hide();
                  var el = document.getElementById('xtr_full_splash');
                  if(el) el.style.display = 'none';
              }}, 4000);
          }};
          </script>
          """
          
          if '</body>' in html:
              html = html.replace('</body>', script + '\n</body>')
          else:
              html += script

          os.makedirs('xtrapp/res', exist_ok=True)
          os.makedirs('xtrapp/www', exist_ok=True)

          if splash != 'null':
              try:
                  with open('xtrapp/www/splash.png', 'wb') as f:
                      f.write(base64.b64decode(splash + '==='))
                  full_splash_html = '''
                  <div id="xtr_full_splash" style="position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:999999999; background: #FFFFFF url('splash.png') no-repeat center center; background-size: 100% 100%;"></div>
                  <script>
                  setTimeout(function() {
                      var el = document.getElementById('xtr_full_splash');
                      if(el) el.style.display = 'none';
                  }, 3000);
                  </script>
                  '''
                  if '<body' in html.lower():
                      html = re.sub(r'(<body[^>]*>)', r'\1' + full_splash_html, html, count=1, flags=re.IGNORECASE)
                  else:
                      html = full_splash_html + html
              except Exception as e: pass

          with open('xtrapp/www/index.html', 'w', encoding='utf-8') as f:
              f.write(html)

          with open('xtrapp/config.xml', 'r', encoding='utf-8') as f:
              config = f.read()
              
          config = config.replace('<widget ', '<widget xmlns:android=\"http://schemas.android.com/apk/res/android\" ')

          # 🚨 ম্যাজিক ২: অ্যাপকে বলে দেওয়া হলো যেন জীবনেও সাদা স্ক্রিনে আটকে না থাকে!
          timeout_fix = """
          <preference name="loadUrlTimeoutValue" value="700000" />
          <preference name="KeepRunning" value="true" />
          <preference name="ErrorUrl" value="file:///android_asset/www/index.html" />
          """
          config = config.replace('</widget>', timeout_fix + '\n</widget>')

          if icon != 'null':
              try:
                  with open('xtrapp/res/icon.png', 'wb') as f:
                      f.write(base64.b64decode(icon + '==='))
                  config = config.replace('</widget>', '    <icon src="res/icon.png" />\n</widget>')
              except: pass

          p_xml = '<platform name="android">\n'
          p_xml += '  <edit-config file="app/src/main/AndroidManifest.xml" mode="merge" target="/manifest/application">\n    <application android:theme="@style/Theme.AppCompat.NoActionBar" android:usesCleartextTraffic="true" />\n  </edit-config>\n'
          
          if use_cam:
              p_xml += '  <config-file target="AndroidManifest.xml" parent="/*">\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n  </config-file>\n'
          if use_mic:
              p_xml += '  <config-file target="AndroidManifest.xml" parent="/*">\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n  </config-file>\n'
          if use_storage:
              p_xml += '  <config-file target="AndroidManifest.xml" parent="/*">\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n  </config-file>\n'
          p_xml += '</platform>'

          config = config.replace('</widget>', p_xml + '\n</widget>')
          with open('xtrapp/config.xml', 'w', encoding='utf-8') as f:
              f.write(config)
          EOF
          
          python3 process_app.py

      - name: Compile and Build APK
        run: |
          cd xtrapp
          export GRADLE_OPTS="-Xmx2048m -Dorg.gradle.daemon=false"
          echo "org.gradle.jvmargs=-Xmx2048m" >> platforms/android/gradle.properties
          cordova build android --debug

      - name: Release Final APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_NAME: ${{ github.event.client_payload.app_name }}
        run: |
          SAFE_NAME=$(echo "$APP_NAME" | tr -d ' ' | tr -d '"' | tr -d "'")
          gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/$SAFE_NAME || true
          gh release delete $SAFE_NAME -y -R ${{ github.repository }} || true
          gh release create $SAFE_NAME xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk -t "$SAFE_NAME" -n "Build for $APP_NAME" -R ${{ github.repository }}
