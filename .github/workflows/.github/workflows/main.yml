name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # রিলিজ করার জন্য পারমিশন
    steps:
      - name: Checkout Template
        uses: actions/checkout@v3
        with:
          repository: 'braver-tool/android-webview-template'

      - name: Inject User Code
        run: |
          echo "${{ github.event.client_payload.html_code }}" > app/src/main/assets/index.html
          sed -i "s/AppName/${{ github.event.client_payload.app_name }}/g" app/src/main/res/values/strings.xml
          sed -i "s/com.example.webview/${{ github.event.client_payload.package_name }}/g" app/build.gradle

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Delete Old Release
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: app/build/outputs/apk/debug/app-debug.apk
          name: "Latest Build: ${{ github.event.client_payload.app_name }}"
          body: "This APK was built by Xtr Studio for ${{ github.event.client_payload.app_name }}."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
