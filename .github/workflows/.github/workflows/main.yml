name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Template
        uses: actions/checkout@v3
        with:
          repository: 'braver-tool/android-webview-template' # এটি একটি বেস টেমপ্লেট

      - name: Inject User Code
        run: |
          echo "${{ github.event.client_payload.html_code }}" > app/src/main/assets/index.html
          sed -i "s/AppName/${{ github.event.client_payload.app_name }}/g" app/src/main/res/values/strings.xml
          sed -i "s/com.example.webview/${{ github.event.client_payload.package_name }}/g" app/build.gradle

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: ${{ github.event.client_payload.app_name }}-v${{ github.event.client_payload.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
