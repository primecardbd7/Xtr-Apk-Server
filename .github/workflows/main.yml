name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Fresh Android App
        run: |
          cordova create xtrapp "${{ github.event.client_payload.package_name }}" "${{ github.event.client_payload.app_name }}"
          cd xtrapp
          # লেটেস্ট অ্যান্ড্রয়েড প্ল্যাটফর্ম অ্যাড করা হচ্ছে (পুরনো স্প্ল্যাশ প্লাগিন বাতিল)
          cordova platform add android@13.0.0

      - name: Inject User HTML Code Safely
        env:
          HTML_DATA: ${{ github.event.client_payload.html_code }}
        run: |
          python3 -c "import os; open('xtrapp/www/index.html', 'w', encoding='utf-8').write(os.environ['HTML_DATA'])"

      - name: Process App Icon & Splash Screen
        env:
          ICON_DATA: ${{ github.event.client_payload.app_icon }}
          SPLASH_DATA: ${{ github.event.client_payload.splash_screen }}
        run: |
          python3 -c "
          import os, base64
          os.makedirs('xtrapp/res', exist_ok=True)
          
          icon_data = os.environ.get('ICON_DATA', '').strip()
          splash_data = os.environ.get('SPLASH_DATA', '').strip()
          
          config = open('xtrapp/config.xml').read()

          if icon_data:
              with open('xtrapp/res/icon.png', 'wb') as f:
                  f.write(base64.b64decode(icon_data))
              config = config.replace('</widget>', '    <icon src=\"res/icon.png\" />\n</widget>')

          if splash_data:
              with open('xtrapp/res/splash.png', 'wb') as f:
                  f.write(base64.b64decode(splash_data))
              # 🚨 Android 12+ এর নতুন স্প্ল্যাশ স্ক্রিন সিস্টেম
              splash_xml = '''
              <preference name=\"SplashScreenDelay\" value=\"3000\" />
              <preference name=\"FadeSplashScreenDuration\" value=\"1000\" />
              <preference name=\"ShowSplashScreenSpinner\" value=\"false\" />
              <preference name=\"AndroidWindowSplashScreenAnimatedIcon\" value=\"res/splash.png\" />
              <preference name=\"AndroidWindowSplashScreenBackground\" value=\"#FFFFFF\" />
              <splash src=\"res/splash.png\" />
              </widget>
              '''
              config = config.replace('</widget>', splash_xml)

          open('xtrapp/config.xml', 'w').write(config)
          "

      - name: Compile and Build APK
        run: |
          cd xtrapp
          cordova build android --debug

      - name: Delete Old Server Files
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Final APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
