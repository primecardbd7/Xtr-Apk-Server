name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Install Cordova Framework
        run: npm install -g cordova

      - name: Setup Java 11
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Create Fresh Android App
        run: |
          cordova create xtrapp "${{ github.event.client_payload.package_name }}" "${{ github.event.client_payload.app_name }}"
          cd xtrapp
          cordova platform add android

      - name: Inject User HTML Code Safely
        run: |
          node -e "const fs = require('fs'); fs.writeFileSync('xtrapp/www/index.html', process.env.HTML_CODE);"
        env:
          HTML_CODE: ${{ github.event.client_payload.html_code }}

      - name: Compile and Build APK
        run: |
          cd xtrapp
          cordova build android

      - name: Delete Old App File
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload New APK for Download
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
