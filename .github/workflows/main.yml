name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup Java 17 (Force Java 17 for Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova App Builder
        run: npm install -g cordova

      - name: Create Fresh Android App
        run: |
          cordova create xtrapp "${{ github.event.client_payload.package_name }}" "${{ github.event.client_payload.app_name }}"
          cd xtrapp
          cordova platform add android@13.0.0

      - name: Inject User HTML Code Safely
        env:
          HTML_DATA: ${{ github.event.client_payload.html_code }}
        run: |
          python3 -c "import os; open('xtrapp/www/index.html', 'w', encoding='utf-8').write(os.environ['HTML_DATA'])"

      - name: Compile and Build APK
        run: |
          cd xtrapp
          cordova build android --debug

      - name: Delete Old Server Files
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Final APK for Download
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
