name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          repository: 'braver-tool/android-webview-template'

      - name: Inject User HTML
        run: |
          echo "${{ github.event.client_payload.html_code }}" > app/src/main/assets/index.html
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Delete Old Release
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
