name: Xtr Studio APK Builder
on:
  repository_dispatch:
    types: [build_apk]

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Setup Java 17 (🚨 লেটেস্ট ইঞ্জিনের জন্য)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Fresh Android App
        run: |
          cordova create xtrapp "${{ github.event.client_payload.package_name }}" "${{ github.event.client_payload.app_name }}"
          cd xtrapp
          # 🚨 লেটেস্ট Android ব্যবহার করা হচ্ছে
          cordova platform add android@13.0.0
          cordova plugin add cordova-plugin-android-permissions

      - name: Process App Data & Full-Screen Splash
        env:
          HTML_DATA: ${{ github.event.client_payload.html_code }}
          ICON_URL: ${{ github.event.client_payload.icon_url }}
          SPLASH_URL: ${{ github.event.client_payload.splash_url }}
          USE_CAMERA: ${{ github.event.client_payload.use_camera }}
          USE_MIC: ${{ github.event.client_payload.use_mic }}
        run: |
          python3 -c "
          import os, urllib.request

          # 1. HTML & Permission Script Setup
          html_data = os.environ.get('HTML_DATA', '<h1>Error loading code</h1>')
          use_camera = str(os.environ.get('USE_CAMERA', 'false')).lower() == 'true'
          use_mic = str(os.environ.get('USE_MIC', 'false')).lower() == 'true'

          if 'cordova.js' not in html_data:
              html_data = '<script src=\"cordova.js\"></script>\n' + html_data

          permission_script = f'''
          <script>
          document.addEventListener('deviceready', function() {{
              var permissions = cordova.plugins.permissions;
              var list = [];
              if ({str(use_camera).lower()}) list.push(permissions.CAMERA);
              if ({str(use_mic).lower()}) list.push(permissions.RECORD_AUDIO);
              if (list.length > 0) {{
                  permissions.requestPermissions(list, function(){{}}, function(){{}});
              }}
          }}, false);
          </script>
          '''
          
          if '</body>' in html_data:
              html_data = html_data.replace('</body>', permission_script + '\n</body>')
          else:
              html_data += permission_script

          try:
              with open('xtrapp/www/index.html', 'w', encoding='utf-8') as f:
                  f.write(html_data)
          except Exception:
              pass

          # 2. Download Images Safe Mode
          os.makedirs('xtrapp/res', exist_ok=True)
          icon_url = os.environ.get('ICON_URL', 'null').strip()
          splash_url = os.environ.get('SPLASH_URL', 'null').strip()

          config = open('xtrapp/config.xml').read()
          config = config.replace('<widget ', '<widget xmlns:android=\"http://schemas.android.com/apk/res/android\" ')

          if icon_url.startswith('http'):
              try:
                  urllib.request.urlretrieve(icon_url, 'xtrapp/res/icon.png')
                  config = config.replace('</widget>', '    <icon src=\"res/icon.png\" />\n</widget>')
              except Exception:
                  pass

          if splash_url.startswith('http'):
              try:
                  urllib.request.urlretrieve(splash_url, 'xtrapp/res/splash.png')
                  # 🚨 Android 12+ এর নতুন ফুল-স্ক্রিন স্প্ল্যাশ স্ক্রিন ম্যাজিক
                  splash_xml = '''
                  <preference name=\"AndroidWindowSplashScreenAnimatedIcon\" value=\"res/splash.png\" />
                  <preference name=\"AndroidWindowSplashScreenBackground\" value=\"#FFFFFF\" />
                  <preference name=\"SplashScreenDelay\" value=\"3000\" />
                  <preference name=\"ShowSplashScreenSpinner\" value=\"false\" />
                  <preference name=\"FadeSplashScreenDuration\" value=\"500\" />
                  <splash src=\"res/splash.png\" />
                  '''
                  config = config.replace('</widget>', splash_xml + '\n</widget>')
              except Exception:
                  pass

          # 3. Permissions & Theme
          perm_xml = '<platform name=\"android\">\n'
          # ডিফল্ট থিম সেট করা হচ্ছে যাতে অ্যাকশন বার না থাকে
          perm_xml += '  <edit-config file=\"app/src/main/AndroidManifest.xml\" mode=\"merge\" target=\"/manifest/application\">\n    <application android:theme=\"@android:style/Theme.DeviceDefault.NoActionBar\" />\n  </edit-config>\n'
          
          if use_camera:
              perm_xml += '  <config-file target=\"AndroidManifest.xml\" parent=\"/*\">\n    <uses-permission android:name=\"android.permission.CAMERA\" />\n    <uses-feature android:name=\"android.hardware.camera\" android:required=\"false\" />\n  </config-file>\n'
          if use_mic:
              perm_xml += '  <config-file target=\"AndroidManifest.xml\" parent=\"/*\">\n    <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n    <uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\" />\n  </config-file>\n'
          perm_xml += '</platform>'

          config = config.replace('</widget>', perm_xml + '\n</widget>')
          
          with open('xtrapp/config.xml', 'w', encoding='utf-8') as f:
              f.write(config)
          "

      - name: Compile and Build APK
        run: |
          cd xtrapp
          cordova build android --debug

      - name: Release Final APK
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
          gh release create latest xtrapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk -t "latest" -n "Latest Build"
