name: Build APK
on:
  repository_dispatch:
    types: [build_apk]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          echo "Building APK for ${{ github.event.client_payload.app_name }}"
          # এখানে আমরা আপনার দেওয়া ডেটা দিয়ে অ্যাপ বিল্ড করবো
          # আপাতত এটি একটি কনফার্মেশন স্ক্রিপ্ট হিসেবে কাজ করবে
